<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Mein Flask Blog</title>
</head>
<body>
    <h1>Alle Blogbeiträge</h1>

    <div class="header-actions">
        <a href="{{ url_for('add') }}" class="btn">Neuen Beitrag hinzufügen</a>
    </div>

    <div class="beitraege-liste">
        {% for post in posts %}
            <article>
                <h2>{{ post.title }}</h2>
                <p><em>Von: {{ post.author }}</em></p>
                <p>{{ post.content }}</p>

                <div class="post-actions">
                    <a href="{{ url_for('like', post_id=post.id) }}" class="btn btn-like">
                        👍 Like ({{ post.likes if post.likes else 0 }})
                    </a>

                    <a href="{{ url_for('update', post_id=post.id) }}" class="btn btn-update">Bearbeiten</a>

                    <a href="{{ url_for('delete', post_id=post.id) }}"
                       class="btn btn-delete"
                       onclick="return confirm('Wirklich löschen?')">Löschen</a>
                </div>
            </article>
        {% endfor %}
    </div>
</body>
</html>
